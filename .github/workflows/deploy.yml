name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Make sure your default branch is named 'main' (or change this to 'master' if it's not)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # This grants the workflow permission to push the built files to the gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses a stable version of Node.js

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to gh-pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Vite outputs the final built files to the 'dist' folder
